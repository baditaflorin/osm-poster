name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject build metadata
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILT_AT="$(date -u +'%Y-%m-%d %H:%M UTC')"
          # Inject into index.html
          sed -i "s|__BUILD_SHA__|${SHORT_SHA}|g" index.html
          sed -i "s|__BUILD_FULL_SHA__|${GITHUB_SHA}|g" index.html
          sed -i "s|__BUILD_TIME__|${BUILT_AT}|g" index.html
          # Also write a sidecar JSON for any tooling that wants it
          cat > version.json <<EOF
          {
            "sha": "${GITHUB_SHA}",
            "shortSha": "${SHORT_SHA}",
            "builtAt": "${BUILT_AT}",
            "ref": "${GITHUB_REF_NAME}"
          }
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
