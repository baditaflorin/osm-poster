<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OSM Poster — Beautiful Maps from OpenStreetMap</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    background: #f4f3ee;
    color: #111;
    overflow: hidden;
  }

  /* Sidebar */
  aside {
    width: 340px;
    background: #fff;
    padding: 28px 24px;
    overflow-y: auto;
    border-right: 1px solid #e6e4dc;
    flex-shrink: 0;
  }
  aside h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  aside .tag { font-size: 12px; color: #888; margin-bottom: 28px; display: block; margin-top: 2px; }
  aside h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: #999; margin: 22px 0 10px; font-weight: 600;
  }
  aside input[type="text"] {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px; font-family: inherit;
    background: #fafafa;
  }
  aside input[type="text"]:focus { outline: none; border-color: #111; background: #fff; }
  aside input[type="text"] + input[type="text"] { margin-top: 8px; }

  #results { margin-top: 6px; max-height: 220px; overflow-y: auto; }
  #results .result {
    padding: 8px 10px; cursor: pointer; font-size: 13px; border-radius: 6px;
    color: #444; line-height: 1.3;
  }
  #results .result:hover { background: #f0eee6; color: #111; }

  .styles { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .styles button {
    padding: 10px 8px; border: 1px solid #ddd; background: #fff;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit;
    transition: all 0.15s;
  }
  .styles button:hover { border-color: #111; }
  .styles button.active { background: #111; color: #fff; border-color: #111; }

  .frames { display: flex; gap: 6px; }
  .frames button {
    flex: 1; padding: 10px 8px; border: 1px solid #ddd; background: #fff;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .frames button:hover { border-color: #111; }
  .frames button.active { background: #111; color: #fff; border-color: #111; }

  #export {
    width: 100%; padding: 14px; background: #111; color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 28px; font-family: inherit;
    transition: background 0.15s;
  }
  #export:hover:not(:disabled) { background: #333; }
  #export:disabled { opacity: 0.6; cursor: wait; }

  .footer-note {
    font-size: 11px; color: #aaa; margin-top: 18px; line-height: 1.5;
    text-align: center;
  }
  .footer-note a { color: #888; }

  /* Main canvas area */
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 32px; min-width: 0;
  }
  .poster-wrap {
    position: relative;
    background: #fff;
    box-shadow: 0 30px 80px rgba(0,0,0,0.18), 0 8px 20px rgba(0,0,0,0.06);
    transition: aspect-ratio 0.3s;
  }
  .poster-wrap.frame-portrait { width: min(560px, 90%); aspect-ratio: 2 / 3; }
  .poster-wrap.frame-square { width: min(640px, 90%); aspect-ratio: 1 / 1; }
  .poster-wrap.frame-landscape { width: min(800px, 95%); aspect-ratio: 3 / 2; }

  #poster {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: #fff;
  }
  #map-wrap { flex: 1; position: relative; min-height: 0; }
  #map { position: absolute; inset: 0; }

  #caption {
    padding: 26px 32px 30px;
    text-align: center;
    background: #fff;
    border-top: 1px solid #f0ede3;
  }
  #caption-title {
    font-size: 32px; font-weight: 700; letter-spacing: 6px;
    text-transform: uppercase; line-height: 1;
  }
  #caption-subtitle {
    font-size: 13px; color: #666; margin-top: 8px; letter-spacing: 1px;
  }
  #caption-coords {
    font-size: 11px; color: #999; margin-top: 12px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    letter-spacing: 1.5px;
  }

  .maplibregl-ctrl-attrib { font-size: 9px; opacity: 0.7; }
  .maplibregl-ctrl-attrib a { color: #777; }

  @media (max-width: 800px) {
    body { flex-direction: column; overflow: auto; }
    aside { width: 100%; border-right: none; border-bottom: 1px solid #e6e4dc; }
    main { padding: 20px; }
  }
</style>
</head>
<body>
<aside>
  <h1>OSM Poster</h1>
  <span class="tag">Beautiful maps from OpenStreetMap</span>

  <h3>Search a Place</h3>
  <input type="text" id="search" placeholder="City, address, landmark..." autocomplete="off">
  <div id="results"></div>

  <h3>Style</h3>
  <div class="styles" id="styles">
    <button data-style="positron" class="active">Minimal</button>
    <button data-style="bright">Bright</button>
    <button data-style="liberty">Liberty</button>
    <button data-style="dark">Dark</button>
  </div>

  <h3>Frame</h3>
  <div class="frames" id="frames">
    <button data-frame="portrait" class="active">Portrait</button>
    <button data-frame="square">Square</button>
    <button data-frame="landscape">Landscape</button>
  </div>

  <h3>Caption</h3>
  <input type="text" id="title" placeholder="Title (e.g. PARIS)" maxlength="40">
  <input type="text" id="subtitle" placeholder="Subtitle (e.g. The City of Light)" maxlength="80">

  <button id="export">Download PNG</button>

  <div class="footer-note">
    Map data © <a href="https://openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors<br>
    Tiles by <a href="https://openfreemap.org" target="_blank" rel="noopener">OpenFreeMap</a>
  </div>
</aside>

<main>
  <div class="poster-wrap frame-portrait" id="poster-wrap">
    <div id="poster">
      <div id="map-wrap"><div id="map"></div></div>
      <div id="caption">
        <div id="caption-title">PARIS</div>
        <div id="caption-subtitle">The City of Light</div>
        <div id="caption-coords">48.8566° N · 2.3522° E</div>
      </div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>
<script>
const STYLES = {
  positron: 'https://tiles.openfreemap.org/styles/positron',
  bright:   'https://tiles.openfreemap.org/styles/bright',
  liberty:  'https://tiles.openfreemap.org/styles/liberty',
  dark:     'https://tiles.openfreemap.org/styles/dark',
};

const map = new maplibregl.Map({
  container: 'map',
  style: STYLES.positron,
  center: [2.3522, 48.8566],
  zoom: 12,
  attributionControl: { compact: true },
  preserveDrawingBuffer: true,
});

map.on('move', () => {
  const c = map.getCenter();
  document.getElementById('caption-coords').textContent = formatCoords(c.lat, c.lng);
});

function formatCoords(lat, lng) {
  const ns = lat >= 0 ? 'N' : 'S';
  const ew = lng >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(4)}° ${ns} · ${Math.abs(lng).toFixed(4)}° ${ew}`;
}

// Style picker
document.querySelectorAll('#styles button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#styles button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const c = map.getCenter();
    const z = map.getZoom();
    const b = map.getBearing();
    const p = map.getPitch();
    map.setStyle(STYLES[btn.dataset.style]);
    map.once('style.load', () => {
      map.jumpTo({ center: c, zoom: z, bearing: b, pitch: p });
    });
  });
});

// Frame picker
document.querySelectorAll('#frames button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#frames button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const wrap = document.getElementById('poster-wrap');
    wrap.classList.remove('frame-portrait', 'frame-square', 'frame-landscape');
    wrap.classList.add('frame-' + btn.dataset.frame);
    setTimeout(() => map.resize(), 350);
  });
});

// Search via Nominatim
const search = document.getElementById('search');
const results = document.getElementById('results');
let searchTimer;
search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = search.value.trim();
  if (!q) { results.innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(q)}`,
        { headers: { 'Accept': 'application/json' } }
      );
      const items = await r.json();
      results.innerHTML = items.map((it, i) =>
        `<div class="result" data-i="${i}">${escapeHtml(it.display_name)}</div>`
      ).join('');
      results.querySelectorAll('.result').forEach(el => {
        el.addEventListener('click', () => {
          const it = items[+el.dataset.i];
          const lat = +it.lat, lon = +it.lon;
          let zoom = 13;
          if (it.boundingbox) {
            const [s, n, w, e] = it.boundingbox.map(Number);
            map.fitBounds([[w, s], [e, n]], { padding: 20, animate: true });
          } else {
            map.flyTo({ center: [lon, lat], zoom });
          }
          results.innerHTML = '';
          search.value = '';
          const name = it.display_name.split(',')[0].toUpperCase();
          document.getElementById('title').value = name;
          document.getElementById('caption-title').textContent = name;
        });
      });
    } catch (e) {
      results.innerHTML = `<div class="result">Search failed.</div>`;
    }
  }, 400);
});

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Caption inputs
const titleInput = document.getElementById('title');
const subtitleInput = document.getElementById('subtitle');
titleInput.addEventListener('input', () => {
  document.getElementById('caption-title').textContent = titleInput.value || 'PARIS';
});
subtitleInput.addEventListener('input', () => {
  document.getElementById('caption-subtitle').textContent = subtitleInput.value || 'The City of Light';
});

// Export
document.getElementById('export').addEventListener('click', async () => {
  const btn = document.getElementById('export');
  const original = btn.textContent;
  btn.textContent = 'Rendering...';
  btn.disabled = true;
  try {
    map.triggerRepaint();
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    const node = document.getElementById('poster');
    const dataUrl = await htmlToImage.toPng(node, {
      pixelRatio: 4,
      cacheBust: true,
      backgroundColor: '#ffffff',
    });
    const a = document.createElement('a');
    const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
    a.download = `osm-poster-${ts}.png`;
    a.href = dataUrl;
    a.click();
  } catch (e) {
    alert('Export failed: ' + e.message);
    console.error(e);
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
});
</script>
</body>
</html>
